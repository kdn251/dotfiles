[main]
font=JetBrains Mono:size=14
prompt="❯ "
icon-theme=Papirus
icons-enabled=yes

width=100
line-height=40
lines=10
inner-pad=10
horizontal-pad=20
vertical-pad=8

[colors]
background={{background | strip}}f2
text={{foreground | strip}}ff
match={{color4 | strip}}ff
selection={{color8 | strip}}ff
selection-text={{foreground | strip}}ff
border={{color4 | strip}}ff

[border]
width=2
radius=15

[dmenu]
exit-immediately-if-empty=yes

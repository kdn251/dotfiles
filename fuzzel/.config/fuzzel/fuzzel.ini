[main]
# Match your JetBrains Mono 14px
font=JetBrains Mono:size=14
prompt="❯ "
icon-theme=Papirus
# icon-theme=/home/knaught/.cache/twitch-profiles
icons-enabled=yes
# icon-size=128

# Layout adjustments to match your wofi padding/margins
width=100
line-height=40
lines=10
inner-pad=10
horizontal-pad=20
vertical-pad=8

[colors]
# background: #2e3440 at 0.95 alpha (~f2)
background=2e3440f2
# text: #eceff4
text=eceff4ff
# match/highlight: #88c0d0 (Nord Frost)
match=88c0d0ff
# selection: #3b4252 (entry:selected background)
selection=3b4252ff
# selection-text: #88c0d0 (entry:selected #text)
selection-text=88c0d0ff
# border: #88c0d0
border=88c0d0ff

[border]
width=2
radius=15

[dmenu]
# This ensures the exit code behaves like wofi for your scripts
exit-immediately-if-empty=yes

l seek 5
h seek -5
j seek -60
k seek 60
S cycle sub

# This requires uosc
V script-binding memo-history #! History

# Go to beginning (1%)
g-g seek 1 absolute-percent

# Step 1: Tell mpv that a single 'g' should wait for a second key
g ignore
# Go to end (95% since going to real end wouldn't make sense)
G seek 95 absolute-percent

p cycle ontop

Shift+= add video-zoom 0.1
Shift+- add video-zoom -0.1
# Reset video/audio/sub adjustments to defaults
Shift+) set video-zoom 0; set video-pan-x 0; set video-pan-y 0; set panscan 0; set video-rotate 0; set video-aspect-override -1; set speed 1; set audio-delay 0; set sub-delay 0; set sub-pos 100; set sub-scale 1; set contrast 0; set brightness 0; set gamma 0; set saturation 0; set hue 0; show-text "Reset to defaults"

Shift+h add video-pan-x 0.05
Shift+l add video-pan-x -0.05
Shift+k add video-pan-y 0.05
Shift+j add video-pan-y -0.05

# Set screeenshot to 'S' and disable default 's' screenshot keybind
Shift+s screenshot video
s ignore

# Override 'q' to kill Chatterino first, then quit mpv
# q run "/usr/bin/pkill" "-TERM" "chatterino" ; quit
# Kill Chatterino, then force mpv to exit immediately
q run "sh" "-c" "pkill -TERM chatterino"; quit-watch-later
# q run "sh" "-c" "pkill -TERM chatterino; pkill -9 mpv"

# Run clip script to clip last 30 seconds of current stream
c run "/home/knaught/scripts/mpv-clip.sh"

D run "/home/knaught/scripts/download-yt-video.sh"


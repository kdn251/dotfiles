# ============================================
# TERMINAL & COLOR SETTINGS
# ============================================
# Use tmux-256color for modern features (clipboard/true color)
# set -g default-terminal "tmux-256color"
# 
# # Enable 24-bit RGB color support
# set-option -ga terminal-overrides ",xterm-256color:Tc"
# set-option -ga terminal-overrides ",xterm-kitty:Tc"
# 
# # Enable Clipboard & OSC 52 Passthrough
# set -s set-clipboard on
# set -g allow-passthrough on
# # Explicitly tell tmux that Kitty supports the clipboard (Ms)
# set -as terminal-overrides ',xterm-kitty:Ms=\\E]52;c;%p2%s\\7'
# set -as terminal-features ',xterm-kitty:clipboard'

# ============================================
# TERMINAL & COLOR SETTINGS
# ============================================

# Support 24-bit color (The 'RGB' flag is the modern way)
set -as terminal-features ",xterm-kitty:RGB"



# ============================================
# GENERAL SETTINGS
# ============================================
set -g prefix C-s
unbind C-b
bind-key C-s send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set-option -g allow-rename off
set -g history-limit 10000

# ============================================
# LOOK & FEEL
# ============================================
set -g status-style bg=default
set -g status-fg white
set -g status-justify centre

set -g status-left "#[fg=blue]Session: #S #[fg=yellow]| "
set -g status-left-length 40
set -g status-right "#[fg=cyan]%H:%M %d-%b-%y"
set -g status-right-length 50

# Pane Borders (Tokyo Night Moon style)
set -g pane-border-style fg=colour240
set -g pane-active-border-style "bg=default fg=blue"

# ============================================
# KEYBINDINGS
# ============================================
bind | split-window -h
bind - split-window -v
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Resize panes
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# ============================================
# PLUGINS
# ============================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'

# ============================================
# FINAL OVERRIDE (PLACE AT BOTTOM)
# ============================================

# This tells tmux to pass OSC 52 sequences through to Kitty
# The 'Ms' entry is the explicit terminal capability for the clipboard
# set -as terminal-overrides ',xterm-kitty:Ms=\\E]52;c;%p2%s\\a'
# Tell tmux to recognize the OSC 52 sequence (Ms) specifically for xterm-compatible terminals

# 1. Allow applications to send escape sequences through tmux
set -g allow-passthrough on

# 2. Tell tmux to use OSC 52 (Ms) for your terminal
# This matches the 'wrapped' format that just worked for you
set -as terminal-overrides ',xterm-kitty:Ms=\\E]52;c;%p2%s\\a'

# 3. Ensure tmux actually tries to use the clipboard
set -s set-clipboard on

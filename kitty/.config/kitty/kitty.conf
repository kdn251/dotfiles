background #1e1e2e
# Wallust-generated palette — disabled. Uncomment the include and remove
# the hardcoded background above to re-enable wallpaper-derived theming.
# include ${HOME}/.config/kitty/colors-kitty.conf

font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono Nerd Font Mono Extra Bold
bold_italic_font JetBrainsMono Nerd Font Mono Extra Bold Italic
font_size 14.0

linux_display_server wayland

touch_scroll_multiplier 4.0


allow_remote_control yes
# This allows the VPS to write to your local clipboard
clipboard_control write-clipboard write-primary read-clipboard read-primary

# This allows 'pass-through' sequences which tmux often uses
allow_hyperlinks yes
